name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit production dependencies
        run: bun audit --production

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Unit and integration tests with coverage
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: Record release identity
        run: |
          printf '{"commit":"%s","run":"%s"}\n' "$GITHUB_SHA" "$GITHUB_RUN_ID" > build/release.json

      - name: Assert production headers and redirects
        run: bun run check:headers

      - name: Enforce bundle budgets
        run: bun run check:bundle

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Hermetic end-to-end tests and production offline checks
        run: bun run test:e2e

      - name: Retain Playwright failure artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Package verified artifact
        run: |
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -czf bounty-ninja-build.tar.gz build
          sha256sum bounty-ninja-build.tar.gz > bounty-ninja-build.tar.gz.sha256
          sha256sum --check bounty-ninja-build.tar.gz.sha256

      - name: Retain verified artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bounty-ninja-${{ github.sha }}
          path: |
            bounty-ninja-build.tar.gz
            bounty-ninja-build.tar.gz.sha256
          if-no-files-found: error
          retention-days: 30

  deploy:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download verified artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bounty-ninja-${{ github.sha }}

      - name: Reject superseded release
        env:
          GH_TOKEN: ${{ github.token }}
        run: test "$(gh api "repos/$GITHUB_REPOSITORY/commits/main" --jq .sha)" = "$GITHUB_SHA"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5

      - name: Verify artifact
        run: |
          sha256sum --check bounty-ninja-build.tar.gz.sha256
          tar -xzf bounty-ninja-build.tar.gz

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.110.0
          command: pages deploy build --project-name=bounty-ninja

      - name: Validate deployment and custom domain
        env:
          EXPECTED_RELEASE_SHA: ${{ github.sha }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: bun run smoke:deployment -- "$DEPLOYMENT_URL" "https://bounty.ninja"

      - name: Report production validation failure
        if: failure()
        run: |
          echo "::error title=Production deployment validation failed::Release $GITHUB_SHA failed deploy or smoke validation"
          {
            echo "## Production deployment validation failed"
            echo "Commit: \`$GITHUB_SHA\`"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "Payment writes remain disabled by default."
          } >> "$GITHUB_STEP_SUMMARY"
