name: Production rollback

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Successful CI run retaining the rollback artifact
        required: true
        type: string
      commit:
        description: Full commit SHA recorded by that artifact
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      deployments: write
    steps:
      - name: Verify retained artifact source run
        env:
          EXPECTED_COMMIT: ${{ inputs.commit }}
          EXPECTED_RUN_ID: ${{ inputs.run_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(printf '%s' "$EXPECTED_RUN_ID" | tr -d '0-9')" = ""
          test -n "$EXPECTED_RUN_ID"
          test "${#EXPECTED_COMMIT}" -eq 40
          test "$(printf '%s' "$EXPECTED_COMMIT" | tr -d '0-9a-f')" = ""

          expected_workflow_id="$(gh api "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml" --jq .id)"
          run_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$EXPECTED_RUN_ID")"
          test "$(jq -r .workflow_id <<<"$run_json")" = "$expected_workflow_id"
          test "$(jq -r .event <<<"$run_json")" = "push"
          test "$(jq -r .head_branch <<<"$run_json")" = "main"
          test "$(jq -r .status <<<"$run_json")" = "completed"
          test "$(jq -r .conclusion <<<"$run_json")" = "success"
          test "$(jq -r .head_sha <<<"$run_json")" = "$EXPECTED_COMMIT"

      - name: Check out exact retained artifact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit }}
          fetch-depth: 0
          path: source
          persist-credentials: false

      - name: Verify source commit belongs to current main
        env:
          EXPECTED_COMMIT: ${{ inputs.commit }}
        working-directory: source
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          git merge-base --is-ancestor "$EXPECTED_COMMIT" refs/remotes/origin/main

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5

      - name: Download retained verified artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bounty-ninja-${{ inputs.commit }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Verify checksum and release identity
        env:
          EXPECTED_COMMIT: ${{ inputs.commit }}
          EXPECTED_RUN_ID: ${{ inputs.run_id }}
        run: |
          test "${#EXPECTED_COMMIT}" -eq 40
          sha256sum --check bounty-ninja-build.tar.gz.sha256
          tar -xzf bounty-ninja-build.tar.gz
          bun run source/scripts/release-metadata.ts validate build/release.json
          test "$(jq -r .commit build/release.json)" = "$EXPECTED_COMMIT"
          test "$(jq -r .source.runId build/release.json)" = "$EXPECTED_RUN_ID"
          test "$(jq -r .paymentWritesEnabled build/release.json)" = "false"

      - name: Deploy retained artifact to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.110.0
          command: pages deploy build --project-name=bounty-ninja --branch=main

      - name: Validate rollback deployment and custom domain
        env:
          EXPECTED_RELEASE_SHA: ${{ inputs.commit }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: bun run source/scripts/smoke-deployment.ts "$DEPLOYMENT_URL" "https://bounty.ninja"
